name: test

on:
  push:
    branches:
      - main
  pull_request:
  workflow_call:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m ruff check src tests tools
      - run: python -m build
      - run: python -m twine check dist/*
      - run: python tools/wheel_smoke.py dist/*.whl

  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.9", "3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev]"
      - run: python -m pytest -q

  tmux-smoke:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"
      - name: Install tmux on Linux
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y tmux
      - name: Install tmux on macOS when missing
        if: runner.os == 'macOS'
        run: command -v tmux >/dev/null || brew install tmux
      - run: python -m pip install -U pip
      - run: python -m pip install -e ".[dev]"
      - name: Run isolated real-tmux smoke test
        env:
          RAILMUX_RUN_TMUX_INTEGRATION: "1"
        run: python -m pytest -q tests/test_tmux_integration.py
