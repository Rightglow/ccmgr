name: release

on:
  push:
    tags:
      - "v*"

jobs:
  test:
    uses: ./.github/workflows/test.yml

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.9"

      - name: Verify tag matches package version
        run: |
          set -euo pipefail
          tag="${GITHUB_REF_NAME#v}"
          pkg=$(python -c "import re,pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('src/railmux/__init__.py').read_text()).group(1))")
          [ "$tag" = "$pkg" ] || { echo "::error::tag v$tag != __version__ $pkg"; exit 1; }

      - name: Render curated release notes
        run: python tools/release_notes.py "$GITHUB_REF_NAME" --output release-notes.md

      - run: python -m pip install --upgrade build twine

      - name: Install tmux
        run: sudo apt-get update && sudo apt-get install -y tmux

      - run: |
          python -m pip install -e ".[dev]"
          python -m ruff check src tests tools
          python -m pytest -q

      - name: Run isolated real-tmux smoke test
        env:
          RAILMUX_RUN_TMUX_INTEGRATION: "1"
        run: python -m pytest -q tests/test_tmux_integration.py

      - run: |
          rm -rf dist build src/*.egg-info
          python -m build

      - run: python -m twine check dist/*

      - run: python tools/wheel_smoke.py dist/*.whl

      - uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

      - uses: actions/upload-artifact@v7
        with:
          name: release-notes
          path: release-notes.md

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - uses: actions/download-artifact@v8
        with:
          name: release-notes
          path: release-notes/

      - env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "$GITHUB_REF_NAME" \
            --title "$GITHUB_REF_NAME" \
            --verify-tag \
            --notes-file release-notes/release-notes.md \
            dist/*
